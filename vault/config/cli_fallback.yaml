# Multi-CLI Fallback Configuration
# Personal AI Employee - CLI Management Settings

fallback_strategy:
  # Primary CLI preference order
  primary: "claude"
  secondary: "qwen"
  tertiary: "codex"

  # Task-specific routing
  task_routing:
    code_generation: ["codex", "claude", "qwen"]
    code_debugging: ["codex", "claude", "qwen"]
    reasoning: ["claude", "qwen", "codex"]
    planning: ["claude", "qwen", "codex"]
    simple_processing: ["qwen", "claude", "codex"]
    data_extraction: ["qwen", "claude", "codex"]
    general: ["claude", "qwen", "codex"]

# Quota limits and monitoring
quota_limits:
  claude:
    daily_limit: 1000
    warning_threshold: 100
    reset_hour: 0  # UTC midnight
    retry_after_minutes: 60

  codex:
    daily_limit: 500
    warning_threshold: 50
    reset_hour: 0
    retry_after_minutes: 30

  qwen:
    # Local model - no limits
    unlimited: true
    local_model: true

# Platform-specific settings
windows_settings:
  claude:
    executable: "claude.exe"
    timeout_seconds: 120

  qwen:
    executable: "qwen.exe"
    timeout_seconds: 60
    local_model: true
    offline_capable: true

  codex:
    executable: "gh.exe"
    subcommand: "copilot"
    timeout_seconds: 60
    requires_auth: true

linux_settings:
  claude:
    executable: "claude"
    timeout_seconds: 120

  qwen:
    executable: "qwen"
    timeout_seconds: 60
    local_model: true
    offline_capable: true

  codex:
    executable: "gh"
    subcommand: "copilot"
    timeout_seconds: 60
    requires_auth: true

# Notification settings
notifications:
  quota_warning: true
  fallback_switch: true
  cli_failure: true

  # Webhook URLs (optional)
  slack_webhook: ""
  discord_webhook: ""

  # Email notifications (optional)
  email_enabled: false
  smtp_server: ""
  smtp_port: 587
  email_from: ""
  email_to: ""

# Retry and error handling
error_handling:
  max_retries: 3
  retry_delay_seconds: 5
  exponential_backoff: true

  # Specific error patterns
  quota_error_patterns:
    - "quota exceeded"
    - "rate limit"
    - "usage limit"
    - "billing"

  network_error_patterns:
    - "connection timeout"
    - "network error"
    - "dns resolution"

  auth_error_patterns:
    - "authentication"
    - "unauthorized"
    - "invalid token"

# Performance optimization
performance:
  # Cache successful CLI responses for similar prompts
  enable_caching: true
  cache_duration_minutes: 30

  # Parallel processing for independent tasks
  enable_parallel: true
  max_parallel_tasks: 3

  # Prompt optimization
  max_prompt_length: 8000
  truncate_long_prompts: true

# Logging and monitoring
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_file: "vault/logs/cli_manager.log"
  log_rotation: true
  max_log_size_mb: 10
  backup_count: 5

  # What to log
  log_quota_checks: true
  log_cli_calls: true
  log_fallbacks: true
  log_errors: true
  log_performance: true

# Development and testing
development:
  # Mock CLI responses for testing
  mock_mode: false
  mock_responses:
    claude: "Mock Claude response"
    qwen: "Mock Qwen response"
    codex: "Mock Codex response"

  # Testing settings
  test_mode: false
  test_quota_limits:
    claude: 10
    codex: 5