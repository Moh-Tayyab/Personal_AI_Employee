version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: odoo-postgres
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Odoo Community Edition
  odoo:
    image: odoo:17.0
    container_name: odoo-community
    depends_on:
      db:
        condition: service_healthy
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
      - ADMIN_PASSWORD=odoo123
    ports:
      - "8069:8069"
    volumes:
      - odoo-config:/etc/odoo
      - odoo-addons:/mnt/extra-addons
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8069/web/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  odoo-db-data:
    driver: local
  odoo-config:
    driver: local
  odoo-addons:
    driver: local

networks:
  default:
    name: odoo-network
